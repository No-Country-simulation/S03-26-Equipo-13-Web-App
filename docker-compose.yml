services:
  postgres:
    image: postgres:16-alpine
    container_name: startupcrm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crmuser
      POSTGRES_PASSWORD: crmpass
      POSTGRES_DB: startupcrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: startupcrm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
