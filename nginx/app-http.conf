# Configuración HTTP temporal — reemplazar por app.conf tras obtener certificados SSL
# Activar con: certbot --nginx -d vigu.blog -d www.vigu.blog -d api.vigu.blog

server {
    server_name vigu.blog www.vigu.blog;

    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/vigu.blog/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vigu.blog/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    server_name api.vigu.blog;

    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/vigu.blog/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vigu.blog/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = www.vigu.blog) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = vigu.blog) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name vigu.blog www.vigu.blog;
    return 404; # managed by Certbot




}

server {
    if ($host = api.vigu.blog) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api.vigu.blog;
    return 404; # managed by Certbot


}