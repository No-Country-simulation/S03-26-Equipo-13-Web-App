# ─────────────────────────────────────────────
#  HTTP → HTTPS redirect  (vigu.blog)
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name vigu.blog www.vigu.blog;
    return 301 https://vigu.blog$request_uri;
}

# ─────────────────────────────────────────────
#  HTTP → HTTPS redirect  (api.vigu.blog)
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name api.vigu.blog;
    return 301 https://api.vigu.blog$request_uri;
}

# ─────────────────────────────────────────────
#  Frontend — Next.js  (puerto interno 3000)
#  https://vigu.blog
# ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name vigu.blog www.vigu.blog;

    ssl_certificate     /etc/letsencrypt/live/vigu.blog/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vigu.blog/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirige www → sin www
    if ($host = www.vigu.blog) {
        return 301 https://vigu.blog$request_uri;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─────────────────────────────────────────────
#  Backend — NestJS API  (puerto interno 3001)
#  https://api.vigu.blog
# ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.vigu.blog;

    ssl_certificate     /etc/letsencrypt/live/api.vigu.blog/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vigu.blog/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # WebSockets para Socket.IO
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
